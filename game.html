function playMp3(a) {
    if (muted) return;
    a.currentTime = 0;
    a.play().catch(()=>{});
}
function stopMp3(a) { a.pause(); a.currentTime = 0; }

// Web Audio sfx (jump + stomp — no MP3 for these)
function playNote(freq, dur, vol, type, delay) {
    if (muted) return;
    const a = getAC(), t = a.currentTime + (delay || 0);
    const osc = a.createOscillator(), g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = type || 'square';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.start(t); osc.stop(t + dur + 0.01);
}

function sfxJump() {
    playNote(280, 0.05, 0.12, 'square', 0);
    playNote(460, 0.08, 0.10, 'square', 0.05);
}
function sfxStomp() {
    if (muted) return;
    const a = getAC();
    const osc = a.createOscillator(), g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, a.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, a.currentTime + 0.18);
    g.gain.setValueAtTime(0.4, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.22);
    osc.start(); osc.stop(a.currentTime + 0.23);
}

/* ─── AABB collision ─────────────────────────────────────── */
function overlaps(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function solvePlatforms(obj) {
    obj.onGround = false;
    for (const p of platforms) {
        if (!overlaps(obj, p)) continue;
        const ox = Math.min(obj.x+obj.w, p.x+p.w) - Math.max(obj.x, p.x);
        const oy = Math.min(obj.y+obj.h, p.y+p.h) - Math.max(obj.y, p.y);
        if (oy <= ox) {
            // vertical collision
            if (obj.y + obj.h/2 < p.y + p.h/2) {
                obj.y = p.y - obj.h;
                obj.vy = 0;
                obj.onGround = true;
            } else {
                obj.y = p.y + p.h;
                obj.vy = Math.max(0, obj.vy);
            }
        } else {
            // horizontal collision
            if (obj.x + obj.w/2 < p.x + p.w/2) {
                obj.x = p.x - obj.w;
            } else {
                obj.x = p.x + p.w;
            }
            obj.vx = -obj.vx;
        }
    }
}

/* ─── Drawing helpers ────────────────────────────────────── */
function drawFace(worldX, y, w, h, img, bodyCol, facing, _flat, walkPhase, inAir) {
    const sx = worldX - cameraX;
    if (sx + w < -30 || sx > 830) return;

    const cx   = sx + w / 2;
    const headR = w * 0.48;
    const headCY = y + headR * 0.88;
    const torsoTop = headCY + headR - 1;
    const torsoBot = y + h * 0.70;
    const hipY     = torsoBot;
    const legLen   = h * 0.30;
    const legW = 9, armW = 8, armLen = h * 0.20;

    // swing angles
    const swing    = inAir ? 0 : Math.sin(walkPhase) * 0.52;
    const armSwing = inAir ? 0 : -swing * 0.75;
    const jumpLeg  = inAir ?  0.35 : 0;  // legs slightly apart in air
    const jumpArm  = inAir ? -0.7  : 0;  // arms up in air

    const legA  = inAir ? jumpLeg  : swing;
    const armA  = inAir ? jumpArm  : armSwing;

    ctx.save();
    // flip whole character when facing left
    if (facing === -1) {
        ctx.translate(cx, 0);
        ctx.scale(-1, 1);
        ctx.translate(-cx, 0);
    }

    // shadow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(cx, y + h + 4, w * 0.38, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── back leg (2 segments + knee) ──
    const upperLen = legLen * 0.52, lowerLen = legLen * 0.55;
    const backKnee = inAir ? 0.55 : Math.max(0, -Math.sin(walkPhase)) * 0.55;
    ctx.save();
    ctx.translate(cx, hipY);
    ctx.rotate(-legA);
    ctx.fillStyle = '#1A237E'; // thigh
    ctx.fillRect(-legW/2, 0, legW, upperLen);
    // knee circle
    ctx.fillStyle = '#1565C0';
    ctx.beginPath(); ctx.arc(0, upperLen, legW*0.6, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(0, upperLen);
    ctx.rotate(backKnee);
    ctx.fillStyle = '#1A237E'; // shin
    ctx.fillRect(-legW/2+1, 0, legW-2, lowerLen);
    ctx.fillStyle = '#111'; // shoe
    ctx.beginPath();
    ctx.ellipse(2, lowerLen, legW*0.85, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

    // ── back arm (2 segments + elbow) ──
    const uArm = armLen * 0.48, lArm = armLen * 0.52;
    const backElbow = inAir ? -0.55 : Math.abs(Math.sin(walkPhase)) * 0.35;
    ctx.save();
    ctx.translate(cx + w * 0.27, torsoTop + 5);
    ctx.rotate(-armA - 0.12);
    ctx.globalAlpha = 0.72;
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-armW/2, 0, armW, uArm);
    ctx.fillStyle = bodyCol;
    ctx.beginPath(); ctx.arc(0, uArm, armW*0.55, 0, Math.PI*2); ctx.fill(); // elbow
    ctx.save();
    ctx.translate(0, uArm);
    ctx.rotate(backElbow);
    ctx.fillRect(-armW/2+1, 0, armW-2, lArm);
    ctx.fillStyle = '#FFCC99'; // hand
    ctx.beginPath(); ctx.arc(0, lArm, armW*0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.restore();

    // ── torso (trapezoid) ──
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.39, torsoTop);
    ctx.lineTo(cx + w * 0.39, torsoTop);
    ctx.lineTo(cx + w * 0.28, torsoBot);
    ctx.lineTo(cx - w * 0.28, torsoBot);
    ctx.closePath();
    ctx.fill();

    // belt
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(cx - w * 0.28, hipY - 5, w * 0.56, 5);

    // ── front arm (2 segments + elbow) ──
    const frontElbow = inAir ? -0.55 : Math.abs(Math.sin(walkPhase + Math.PI)) * 0.35;
    ctx.save();
    ctx.translate(cx - w * 0.27, torsoTop + 5);
    ctx.rotate(armA + 0.12);
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-armW/2, 0, armW, uArm);
    ctx.fillStyle = bodyCol;
    ctx.beginPath(); ctx.arc(0, uArm, armW*0.55, 0, Math.PI*2); ctx.fill(); // elbow
    ctx.save();
    ctx.translate(0, uArm);
    ctx.rotate(frontElbow);
    ctx.fillRect(-armW/2+1, 0, armW-2, lArm);
    ctx.fillStyle = '#FFCC99'; // hand
    ctx.beginPath(); ctx.arc(0, lArm, armW*0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.restore();

    // ── front leg (2 segments + knee) ──
    const frontKnee = inAir ? 0.70 : Math.max(0, Math.sin(walkPhase)) * 0.55;
    ctx.save();
    ctx.translate(cx, hipY);
    ctx.rotate(legA);
    ctx.fillStyle = '#283593'; // thigh
    ctx.fillRect(-legW/2, 0, legW, upperLen);
    // knee circle
    ctx.fillStyle = '#1976D2';
    ctx.beginPath(); ctx.arc(0, upperLen, legW*0.6, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(0, upperLen);
    ctx.rotate(frontKnee);
    ctx.fillStyle = '#283593'; // shin
    ctx.fillRect(-legW/2+1, 0, legW-2, lowerLen);
    ctx.fillStyle = '#111'; // shoe
    ctx.beginPath();
    ctx.ellipse(2, lowerLen, legW*0.85, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

    // ── head (face photo clipped to circle) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, cx - headR, headCY - headR, headR * 2, headR * 2);
    ctx.restore();

    // head outline
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore(); // undo facing flip
}

function drawMario(worldX, y, w, h, facing, walkPhase, inAir) {
    const sx = worldX - cameraX;
    if (sx + w < -30 || sx > 830) return;
    const cx = sx + w / 2;

    const headR  = w * 0.48;
    const headCY = y + headR * 0.88;
    const torsoTop = headCY + headR - 1;
    const torsoBot = y + h * 0.70;
    const hipY   = torsoBot;
    const legLen = h * 0.30;
    const legW = 9, armW = 7;
    const armLen = h * 0.20;
    const uArm = armLen * 0.48, lArm = armLen * 0.52;
    const upperLen = legLen * 0.52, lowerLen = legLen * 0.55;

    const swing    = inAir ? 0 : Math.sin(walkPhase) * 0.52;
    const armSwing = inAir ? 0 : -swing * 0.75;
    const legA  = inAir ?  0.35 : swing;
    const armA  = inAir ? -0.7  : armSwing;
    const backKnee  = inAir ? 0.55 : Math.max(0, -Math.sin(walkPhase)) * 0.55;
    const frontKnee = inAir ? 0.70 : Math.max(0, Math.sin(walkPhase)) * 0.55;
    const backElbow  = inAir ? -0.55 : Math.abs(Math.sin(walkPhase)) * 0.35;
    const frontElbow = inAir ? -0.55 : Math.abs(Math.sin(walkPhase + Math.PI)) * 0.35;

    ctx.save();
    if (facing === -1) { ctx.translate(cx,0); ctx.scale(-1,1); ctx.translate(-cx,0); }

    // shadow
    ctx.globalAlpha = 0.15; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(cx, y+h+4, w*0.38, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    // ── back leg ──
    ctx.save(); ctx.translate(cx, hipY); ctx.rotate(-legA);
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(-legW/2, 0, legW, upperLen);
    ctx.beginPath(); ctx.arc(0, upperLen, legW*0.6, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(0, upperLen); ctx.rotate(backKnee);
    ctx.fillRect(-legW/2+1, 0, legW-2, lowerLen);
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.ellipse(2, lowerLen, legW*0.85, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore(); ctx.restore();

    // ── back arm ──
    ctx.save(); ctx.translate(cx + w*0.27, torsoTop+5); ctx.rotate(-armA - 0.12);
    ctx.globalAlpha = 0.72; ctx.fillStyle = '#E53935';
    ctx.fillRect(-armW/2, 0, armW, uArm);
    ctx.beginPath(); ctx.arc(0, uArm, armW*0.55, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(0, uArm); ctx.rotate(backElbow);
    ctx.fillRect(-armW/2+1, 0, armW-2, lArm);
    ctx.fillStyle = '#FFCC99';
    ctx.beginPath(); ctx.arc(0, lArm, armW*0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore(); ctx.globalAlpha = 1; ctx.restore();

    // ── overalls torso ──
    ctx.fillStyle = '#1565C0';
    ctx.beginPath();
    ctx.moveTo(cx - w*0.39, torsoTop); ctx.lineTo(cx + w*0.39, torsoTop);
    ctx.lineTo(cx + w*0.28, torsoBot); ctx.lineTo(cx - w*0.28, torsoBot);
    ctx.closePath(); ctx.fill();
    // red shirt showing at sides
    ctx.fillStyle = '#E53935';
    ctx.fillRect(cx - w*0.42, torsoTop, w*0.08, (torsoBot-torsoTop)*0.7);
    ctx.fillRect(cx + w*0.34, torsoTop, w*0.08, (torsoBot-torsoTop)*0.7);
    // overall straps
    ctx.fillStyle = '#1976D2';
    ctx.fillRect(cx - w*0.18, torsoTop - 6, w*0.12, 10);
    ctx.fillRect(cx + w*0.06, torsoTop - 6, w*0.12, 10);
    // belt buckle area
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(cx - w*0.08, torsoTop + 4, w*0.16, 7);

    // ── front arm ──
    ctx.save(); ctx.translate(cx - w*0.27, torsoTop+5); ctx.rotate(armA + 0.12);
    ctx.fillStyle = '#E53935';
    ctx.fillRect(-armW/2, 0, armW, uArm);
    ctx.beginPath(); ctx.arc(0, uArm, armW*0.55, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(0, uArm); ctx.rotate(frontElbow);
    ctx.fillRect(-armW/2+1, 0, armW-2, lArm);
    ctx.fillStyle = '#FFCC99';
    ctx.beginPath(); ctx.arc(0, lArm, armW*0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore(); ctx.restore();

    // ── front leg ──
    ctx.save(); ctx.translate(cx, hipY); ctx.rotate(legA);
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(-legW/2, 0, legW, upperLen);
    ctx.beginPath(); ctx.arc(0, upperLen, legW*0.6, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(0, upperLen); ctx.rotate(frontKnee);
    ctx.fillRect(-legW/2+1, 0, legW-2, lowerLen);
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.ellipse(2, lowerLen, legW*0.85, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore(); ctx.restore();

    // ── ear ──
    ctx.fillStyle = '#FFBB88';
    ctx.beginPath(); ctx.arc(cx + headR*0.88, headCY + headR*0.1, headR*0.22, 0, Math.PI*2); ctx.fill();

    // ── face (skin) ──
    ctx.fillStyle = '#FFCC99';
    ctx.beginPath(); ctx.arc(cx, headCY, headR, 0, Math.PI*2); ctx.fill();

    // ── cap dome (large red, covers top 60%) ──
    ctx.fillStyle = '#C62828';
    ctx.beginPath();
    ctx.arc(cx - headR*0.05, headCY - headR*0.18, headR*1.08, Math.PI*0.92, 0.08); ctx.fill();

    // ── cap brim (wide, slightly curved down on right) ──
    ctx.fillStyle = '#C62828';
    ctx.beginPath();
    ctx.ellipse(cx + headR*0.18, headCY + headR*0.12, headR*1.22, headR*0.22, 0.08, 0, Math.PI*2);
    ctx.fill();

    // ── "M" badge on cap ──
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.ellipse(cx + headR*0.05, headCY - headR*0.38, headR*0.42, headR*0.3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#C62828';
    ctx.font = `bold ${Math.round(headR*0.75)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('M', cx + headR*0.05, headCY - headR*0.26);
    ctx.textAlign = 'left';

    // ── hair/sideburn ──
    ctx.fillStyle = '#5D4037';
    ctx.beginPath();
    ctx.arc(cx + headR*0.82, headCY + headR*0.28, headR*0.18, 0, Math.PI*2); ctx.fill();

    // ── eyebrow ──
    ctx.strokeStyle = '#3E2723'; ctx.lineWidth = headR*0.18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx + headR*0.08, headCY - headR*0.12);
    ctx.lineTo(cx + headR*0.62, headCY - headR*0.22);
    ctx.stroke();

    // ── eyes (white + pupil) ──
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.ellipse(cx + headR*0.35, headCY + headR*0.06, headR*0.22, headR*0.20, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx + headR*0.42, headCY + headR*0.08, headR*0.12, 0, Math.PI*2); ctx.fill();
    // shine
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(cx + headR*0.46, headCY + headR*0.04, headR*0.05, 0, Math.PI*2); ctx.fill();

    // ── nose (round, prominent) ──
    ctx.fillStyle = '#E8956D';
    ctx.beginPath(); ctx.arc(cx + headR*0.38, headCY + headR*0.32, headR*0.26, 0, Math.PI*2); ctx.fill();

    // ── mustache (3 bumps, wide & bushy) ──
    ctx.fillStyle = '#4E342E';
    // left bump (biggest)
    ctx.beginPath(); ctx.arc(cx - headR*0.12, headCY + headR*0.55, headR*0.30, Math.PI, 0); ctx.fill();
    // middle bump
    ctx.beginPath(); ctx.arc(cx + headR*0.22, headCY + headR*0.52, headR*0.28, Math.PI, 0); ctx.fill();
    // right bump
    ctx.beginPath(); ctx.arc(cx + headR*0.54, headCY + headR*0.50, headR*0.22, Math.PI, 0); ctx.fill();

    ctx.restore();
}

function drawCoins() {
    for (const c of coins) {
        if (c.collected) continue;
        const sx = c.x - cameraX;
        if (sx < -20 || sx > 820) continue;
        const bob = c.y + Math.sin(frameCount * 0.06 + c.x * 0.05) * 4;
        const spin = Math.abs(Math.cos(frameCount * 0.07 + c.x * 0.05));
        ctx.save();
        ctx.translate(sx, bob);
        ctx.scale(spin + 0.08, 1);
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFA000';
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
        ctx.fillText('●', 0, 3);
        ctx.textAlign = 'left';
        ctx.restore();
    }
}

function drawMushrooms() {
    for (const m of mushrooms) {
        if (m.collected) continue;
        const sx = m.x - cameraX;
        if (sx < -20 || sx > 820) continue;
        // stem
        ctx.fillStyle = '#FFF8E1';
        ctx.fillRect(sx - 7, m.y - 10, 14, 14);
        // face on stem
        ctx.fillStyle = '#FFECB3';
        ctx.fillRect(sx - 6, m.y - 8, 12, 8);
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(sx-2, m.y-5, 1.8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+2, m.y-5, 1.8, 0, Math.PI*2); ctx.fill();
        // red cap
        ctx.fillStyle = '#D32F2F';
        ctx.beginPath(); ctx.arc(sx, m.y - 12, 14, Math.PI, 0); ctx.fill();
        ctx.fillRect(sx - 14, m.y - 14, 28, 6);
        // white spots
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(sx-5, m.y-17, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+6, m.y-18, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+1, m.y-11, 2.5, 0, Math.PI*2); ctx.fill();
        // glow
        ctx.strokeStyle = 'rgba(255,100,100,0.4)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(sx, m.y-10, 17, 0, Math.PI*2); ctx.stroke();
    }
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function drawBackground() {
    const W = WORLDS[currentWorld];
    const g = ctx.createLinearGradient(0, 0, 0, 500);
    g.addColorStop(0, W.skyTop);
    g.addColorStop(1, W.skyBot);
    ctx.fillStyle = g; ctx.fillRect(0, 0, 800, 500);

    // Mountains
    ctx.fillStyle = W.mountColor;
    for (let mx = -cameraX*0.12 % 260; mx < 820; mx += 260) {
        ctx.beginPath(); ctx.moveTo(mx, 500);
        ctx.lineTo(mx+130, 260); ctx.lineTo(mx+260, 500); ctx.fill();
    }

    // Clouds (only worlds 1-2, world 3 has stars)
    if (currentWorld < 2) {
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        const cx = -cameraX * 0.28;
        [[cx+80,70,70],[cx+300,55,55],[cx+520,80,65],[cx+750,60,75],
         [cx+1000,75,60],[cx+1200,55,70],[cx+1450,80,55]].forEach(([x,y,s])=>{
            cloud(x%820, y, s);
        });
    } else {
        // Stars for dark castle world
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        for (let i = 0; i < 60; i++) {
            const sx = ((i * 137 - cameraX * 0.05) % 820 + 820) % 820;
            const sy = (i * 73) % 200 + 20;
            const sr = (i % 3 === 0) ? 2 : 1;
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
        }
    }
}

function cloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x,       y, s*0.5, 0, Math.PI*2);
    ctx.arc(x+s*0.4, y-s*0.1, s*0.38, 0, Math.PI*2);
    ctx.arc(x+s*0.8, y, s*0.42, 0, Math.PI*2);
    ctx.fill();
}

function drawPlatforms() {
    for (const p of platforms) {
        const sx = p.x - cameraX;
        if (sx + p.w < 0 || sx > 800) continue;

        // Goal castle
        if (p.x === 3060) {
            ctx.fillStyle = '#B0BEC5';
            ctx.fillRect(sx, p.y, p.w, p.h);
            // battlements
            ctx.fillStyle = '#90A4AE';
            for (let bx = sx; bx < sx + p.w; bx += 22) {
                ctx.fillRect(bx, p.y - 18, 16, 18);
            }
            // door
            ctx.fillStyle = '#4E342E';
            ctx.fillRect(sx + p.w/2 - 18, p.y + p.h - 55, 36, 55);
            ctx.beginPath();
            ctx.arc(sx + p.w/2, p.y + p.h - 55, 18, Math.PI, 0);
            ctx.fill();
            // flag
            ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(sx + p.w/2, p.y - 18);
            ctx.lineTo(sx + p.w/2, p.y - 75);
            ctx.stroke();
            ctx.fillStyle = '#FF1744';
            ctx.beginPath();
            ctx.moveTo(sx + p.w/2, p.y - 75);
            ctx.lineTo(sx + p.w/2 + 30, p.y - 60);
            ctx.lineTo(sx + p.w/2, p.y - 45);
            ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GOAL', sx + p.w/2 + 7, p.y - 57);
            ctx.textAlign = 'left';
            continue;
        }

        const W = WORLDS[currentWorld];
        if (p.h > 30) {
            ctx.fillStyle = W.groundTop;
            ctx.fillRect(sx, p.y, p.w, 16);
            ctx.fillStyle = W.groundDirt;
            ctx.fillRect(sx, p.y+16, p.w, p.h-16);
            ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
            for (let bx = sx; bx < sx+p.w; bx += 32)
                for (let by = p.y+16; by < p.y+p.h; by += 16)
                    ctx.strokeRect(bx, by, 32, 16);
            if (currentWorld === 0) {
                ctx.fillStyle = '#66BB6A';
                for (let gx = sx+6; gx < sx+p.w-6; gx += 14) {
                    ctx.beginPath();
                    ctx.moveTo(gx, p.y); ctx.lineTo(gx+3, p.y-6); ctx.lineTo(gx+6, p.y);
                    ctx.fill();
                }
            }
        } else {
            ctx.fillStyle = W.floatTop;
            ctx.fillRect(sx, p.y, p.w, 10);
            ctx.fillStyle = W.floatDirt;
            ctx.fillRect(sx, p.y+10, p.w, p.h-10);
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
            for (let bx = sx; bx < sx+p.w; bx += 24)
                ctx.strokeRect(bx, p.y+10, 24, p.h-10);
        }
    }
}

/* ─── Update ─────────────────────────────────────────────── */
function update() {
    if (gameState === 'worldwin') {
        if (--worldWinTimer <= 0) { loadWorld(currentWorld + 1); gameState = 'playing'; startBGM(); }
        return;
    }
    if (gameState === 'dead') {
        if (--deadTimer <= 0) {
            if (lives <= 0) { gameState = 'gameover'; sfxGameOver(); }
            else respawn();
        }
        return;
    }
    if (gameState !== 'playing') return;

    // Player movement
    if (keys['ArrowLeft'])  { player.vx = -5.2; player.facing = -1; }
    else if (keys['ArrowRight']) { player.vx =  5.2; player.facing =  1; }
    else player.vx *= 0.72;

    player.vy = Math.min(player.vy + GRAVITY, 18);
    player.x += player.vx;
    player.y += player.vy;
    solvePlatforms(player);

    player.x = Math.max(0, Math.min(player.x, WORLD_W - player.w));
    if (player.y > 580) { killPlayer(); return; }
    if (player.invincible > 0) player.invincible--;
    if (player.onGround && Math.abs(player.vx) > 0.5)
        player.walkPhase += Math.abs(player.vx) * 0.13;

    // Camera
    cameraX = Math.max(0, Math.min(player.x - 340, WORLD_W - 800));

    // Goal check
    const goal = platforms[platforms.length - 1];
    if (player.x + player.w > goal.x + 10 && player.x < goal.x + goal.w - 10 &&
        player.y + player.h >= goal.y - 2) {
        if (currentWorld < WORLDS.length - 1) {
            gameState = 'worldwin'; worldWinTimer = 150;
            sfxWin();
        } else {
            gameState = 'win'; sfxWin(); stopBGM();
        }
        return;
    }

    // Enemies
    for (const e of enemies) {
        if (!e.alive) continue;
        if (e.squished) {
            if (--e.squishTimer <= 0) e.alive = false;
            continue;
        }

        e.vy = Math.min((e.vy || 0) + GRAVITY, 18);
        e.x += e.vx;
        e.y += e.vy;
        solvePlatforms(e);

        if (e.x < 0)          { e.x = 0;           e.vx =  Math.abs(e.vx); }
        if (e.x+e.w > WORLD_W){ e.x = WORLD_W-e.w; e.vx = -Math.abs(e.vx); }
        if (e.y > 580)        { e.alive = false; score += 50; continue; }
        if (e.onGround) e.walkPhase += Math.abs(e.vx) * 0.13;

        // Turn at platform edges
        if (e.onGround) {
            const probe = e.vx > 0 ? e.x + e.w + 6 : e.x - 6;
            const hasFloor = platforms.some(p =>
                probe >= p.x && probe <= p.x+p.w && Math.abs(e.y+e.h - p.y) < 12
            );
            if (!hasFloor) e.vx = -e.vx;
        }

        // Player collision
        if (player.invincible > 0 || !overlaps(player, e)) continue;

        if (player.vy > 0.5 && player.y + player.h < e.y + e.h * 0.52) {
            // Stomp!
            e.squished = true; e.squishTimer = 28;
            player.vy = -9.5;
            score += 100;
            sfxStomp();
            scoreEl.textContent = score;
            enemyEl.textContent = enemies.filter(en => en.alive && !en.squished).length;
        } else {
            killPlayer();
        }
    }

    // collect coins
    for (const c of coins) {
        if (c.collected) continue;
        if (Math.abs(player.x + player.w/2 - c.x) < 18 && Math.abs(player.y + player.h/2 - c.y) < 18) {
            c.collected = true; score += 50; sfxCoin();
        }
    }
    // collect mushrooms
    for (const m of mushrooms) {
        if (m.collected) continue;
        if (Math.abs(player.x + player.w/2 - m.x) < 22 && Math.abs(player.y + player.h/2 - m.y) < 22) {
            m.collected = true; lives++; sfxMushroom();
            livesEl.textContent = lives;
        }
    }

    scoreEl.textContent = score;
    livesEl.textContent = lives;
    enemyEl.textContent = enemies.filter(e => e.alive && !e.squished).length;
}

function killPlayer() {
    if (player.invincible > 0) return;
    lives--; livesEl.textContent = lives;
    player.dead = true;
    gameState = 'dead'; deadTimer = 110;
    sfxDie(); stopBGM();
}

function respawn() {
    Object.assign(player, { x:60, y:350, vx:0, vy:0, onGround:false,
                             facing:1, dead:false, invincible:150, walkPhase:0 });
    cameraX = 0; gameState = 'playing';
    startBGM();
}

/* ─── Draw ───────────────────────────────────────────────── */
function draw() {
    ctx.clearRect(0, 0, 800, 500);
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawMushrooms();

    // Squished enemy splats
    for (const e of enemies) {
        if (!e.squished || !e.alive) continue;
        const sx = e.x - cameraX;
        ctx.save();
        ctx.globalAlpha = e.squishTimer / 28;
        ctx.fillStyle = '#FF8A80';
        ctx.beginPath();
        ctx.ellipse(sx + e.w/2, e.y + e.h, e.w*0.75, 9, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    // Living enemies
    for (const e of enemies) {
        if (!e.alive || e.squished) continue;
        drawFace(e.x, e.y, e.w, e.h, imgs[e.name], WORLDS[currentWorld].enemyColor, e.vx > 0 ? 1 : -1, false, e.walkPhase, !e.onGround);
        // Name tag
        const sx = e.x - cameraX;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        roundRect(sx - 8, e.y - 21, e.w + 16, 17, 4); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(e.name, sx + e.w/2, e.y - 7);
        ctx.textAlign = 'left';
    }

    // Player (blink when invincible)
    if (!player.dead || gameState === 'dead') {
        const blink = player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0;
        if (!blink) {
            drawMario(player.x, player.y, player.w, player.h, player.facing, player.walkPhase, !player.onGround);
        }
    }

    // ── Overlays ──
    if (gameState === 'dead' && lives > 0) {
        overlay('rgba(0,0,0,0.5)');
        bigText('💀 OUCH!', '#FF5252', 200);
        smallText(`Lives: ${lives}`, '#FFF', 262);
        smallText('Respawning...', '#FFD700', 304);
    }
    if (gameState === 'gameover') {
        overlay('rgba(0,0,0,0.78)');
        bigText('GAME OVER', '#FF1744', 195);
        smallText(`Final Score: ${score}`, '#FFD700', 262);
        smallText('Press R to restart', '#AAA', 308);
    }
    if (gameState === 'worldwin') {
        overlay('rgba(0,0,0,0.60)');
        const next = WORLDS[currentWorld + 1];
        bigText(`✅ ${WORLDS[currentWorld].title} Complete!`, '#76FF03', 190);
        smallText(`Next: ${next.title} — ${next.sub}`, '#FFD700', 262);
        smallText('Get ready...', '#FFF', 310);
    }
    if (gameState === 'win') {
        overlay('rgba(0,0,0,0.68)');
        bigText('🏆 YOU WIN!', '#FFD700', 190);
        smallText('All 3 worlds conquered!', '#76FF03', 258);
        smallText(`Final Score: ${score}`, '#FFF', 302);
        smallText('Press R to play again', '#AAA', 344);
    }
    if (gameState === 'loading') {
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,800,500);
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center'; ctx.fillText('Loading faces...', 400, 240);
        ctx.textAlign = 'left';
    }
}

function overlay(color) {
    ctx.fillStyle = color; ctx.fillRect(0,0,800,500);
}
function bigText(t, col, y) {
    ctx.fillStyle = col; ctx.font = 'bold 54px Arial';
    ctx.textAlign = 'center'; ctx.fillText(t, 400, y); ctx.textAlign = 'left';
}
function smallText(t, col, y) {
    ctx.fillStyle = col; ctx.font = '24px Arial';
    ctx.textAlign = 'center'; ctx.fillText(t, 400, y); ctx.textAlign = 'left';
}

/* ─── Game loop ──────────────────────────────────────────── */
let loopStarted = false;
function loop() { frameCount++; update(); draw(); requestAnimationFrame(loop); }

function startGame() {
    score = 0; lives = 3; gameState = 'playing';
    scoreEl.textContent = 0; livesEl.textContent = 3;
    loadWorld(0);
    startBGM();
    if (!loopStarted) { loopStarted = true; loop(); }
}
</script>
